pipeline:
  name: "Smart_Sweeper_Pipeline"
  identifier: "smart_sweeper_pipeline"
  projectIdentifier: "default_project"
  orgIdentifier: "default_org"
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: "harnessSecretManager"
        build: <+input>

  stages:
    - stage:
        name: "Build_And_Test"
        identifier: "build_test"
        type: "CI"
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: "Run"
                  name: "Install_Dependencies"
                  identifier: "install_deps"
                  spec:
                    shell: Sh
                    command: |-
                      echo "Installing Python dependencies..."
                      pip install -r requirements.txt
                      pip install flake8
                      echo "Dependencies installed successfully."

              - step:
                  type: "Run"
                  name: "Code_Quality_Linting"
                  identifier: "code_quality"
                  spec:
                    shell: Sh
                    command: |-
                      echo "Running flake8..."
                      flake8 agent/ api/ utils/ rag/ model/ --max-line-length=120 --ignore=E203,W503
                      echo "Linting passed."

              - step:
                  type: "Run"
                  name: "Validate_MCP_Tools"
                  identifier: "validate_mcp"
                  spec:
                    shell: Sh
                    command: |-
                      echo "Validating MCP Server tools..."
                      python -c "
                      import sys
                      sys.path.insert(0, '.')
                      from agent.tools.mcp_server import mcp
                      tools = mcp._tool_manager.list_tools()
                      print(f'Found {len(tools)} MCP tools:')
                      for tool in tools:
                          print(f'  - {tool.name}')
                      assert len(tools) >= 6, 'Expected at least 6 tools, found ' + str(len(tools))
                      print('MCP tools validation passed.')
                      "

              - step:
                  type: "Run"
                  name: "Smoke_Test_Imports"
                  identifier: "smoke_test"
                  spec:
                    shell: Sh
                    command: |-
                      echo "Running smoke tests for imports..."
                      python -c "
                      import agent.react_agent
                      import api.app
                      import rag.rag_service
                      print('All critical imports successful.')
                      "


