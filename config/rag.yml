# RAG 配置文件
#
# 注意：模型服务配置可通过环境变量覆盖
# 优先级：环境变量 > 此配置文件
#
# 聊天模型配置
chat_model_provider: ollama # ollama or aliyun
chat_model_name: qwen2.5:7b

# 嵌入模型配置
embedding_model_provider: ollama # ollama or aliyun
embedding_model_name: qwen3-embedding:latest

# Rerank 模型配置
rerank_model_path: model/BAAI-bge-reranker-v2-m3
rerank_model_name: BAAI-bge-reranker-v2-m3
rerank_device: cpu  # cpu 或 cuda，根据硬件环境调整

# Ollama 服务地址（建议通过环境变量 OLLAMA_BASE_URL 配置）
# Windows/Mac Docker: http://host.docker.internal:11434
# Linux Docker: http://<宿主机IP>:11434
# 本地开发: http://localhost:11434
ollama_base_url: http://localhost:11434
